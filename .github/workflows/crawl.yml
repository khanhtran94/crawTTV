name: Crawl Tang Thu Vien

on:
  workflow_dispatch:

  # Có thể bật chạy tự động.
  # 02:00 UTC tương đương 09:00 Việt Nam.
  schedule:
    - cron: "7,27,47 * * * *"

permissions:
  contents: write

concurrency:
  group: tang-thu-vien-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Show crawler config
        run: cat config/crawler-config.json

      - name: Build project
        run: mvn --batch-mode clean package -DskipTests

      - name: Run crawler
        run: java -jar target/tang-thu-vien-crawler.jar

      - name: Commit crawler result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/ config/crawler-config.json

          if git diff --cached --quiet; then
            echo "Không có dữ liệu hoặc trạng thái mới."
            exit 0
          fi

          BOOK_NAME=$(jq -r '.bookName' config/crawler-config.json)
          NEXT_CHAPTER=$(jq -r '.nextChapter' config/crawler-config.json)

          git commit -m "Crawl ${BOOK_NAME}, next chapter ${NEXT_CHAPTER}"
          git pull --rebase origin master
          git push